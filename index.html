    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .modal-enter { animation: fadeIn 0.15s ease-out forwards; }
        .tab-enter { animation: fadeIn 0.2s ease-out forwards; }
        .action-sheet-enter { animation: slideUp 0.2s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        
        /* Premium Backgrounds */
        .card-debit-bg { background: linear-gradient(105deg, #111827 0%, #be123c 100%); }
        .card-gold-bg { background: linear-gradient(135deg, #fef08a 0%, #d97706 45%, #f59e0b 100%); }
        .card-kwsp-bg { background: linear-gradient(135deg, #ffffff 0%, #e5e7eb 100%); }
        .card-kwsp-back { background: linear-gradient(135deg, #0A0A0A 0%, #002868 100%); }
        
        /* 3D Flip Utilities */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>

    <script>

            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
